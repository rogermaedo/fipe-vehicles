# Quarkus Configuration file
quarkus.http.port=8080

# OpenAPI / Swagger UI (dev)
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.swagger-ui.path=/q/swagger-ui
%dev.quarkus.smallrye-openapi.path=/q/openapi

# PostgreSQL — alinhado a infra/docker-compose
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:vehicle}
quarkus.datasource.password=${DB_PASSWORD:vehicle}
quarkus.datasource.jdbc.url=${JDBC_URL:jdbc:postgresql://localhost:5432/vehicle}
quarkus.hibernate-orm.database.generation=none

# FIPE HTTP API (fipeapi.json)
#quarkus.rest-client.fipe-api.url=${FIPE_API_BASE_URL:https://parallelum.com.br/fipe/api/v1}
quarkus.rest-client.fipe-api.url=${FIPE_API_BASE_URL:http://localhost:8090}
quarkus.rest-client.fipe-api.connect-timeout=${FIPE_API_CONNECT_TIMEOUT:10000}
quarkus.rest-client.fipe-api.read-timeout=${FIPE_API_READ_TIMEOUT:30000}

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:${RABBITMQ_USER:vehicle}}
rabbitmq-password=${RABBITMQ_PASSWORD:${RABBITMQ_PASS:vehicle}}

mp.messaging.outgoing.brands-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.brands-out.exchange.name=vehicle-brands
mp.messaging.outgoing.brands-out.exchange.type=fanout
mp.messaging.outgoing.brands-out.exchange.declare=true

# Testes: H2 em memória + fila in-memory (requer smallrye-reactive-messaging-in-memory no pom, scope test)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:vehicletest;DB_CLOSE_DELAY=-1

%test.quarkus.rest-client.fipe-api.url=http://testdummy.local/fipe
%test.mp.messaging.outgoing.brands-out.connector=smallrye-in-memory
